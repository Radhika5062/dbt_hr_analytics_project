snapshots:
  - name: hr_data_snapshot
    relation: ref('bronze_snapshot_ephemeral')
    description: This is to preserver history
    config:
      database: snapshot 
      schema: snapshot_sch
      strategy: check
      check_cols: ['monthlyincome', 'stockoptionlevel']
      unique_key: employeenumber
      dbt_valid_to_current: "to_date('9999-12-31')"
